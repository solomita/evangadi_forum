services:
  db:
    image: mysql:8.0
    container_name: evangadi-forum-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3309}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in your .env}
      MYSQL_DATABASE: ${DB_NAME:-evangadi_forum}
      MYSQL_USER: ${DB_USER:?set DB_USER in your .env}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in your .env}
    volumes:
      - evangadi_forum_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  evangadi_forum_db_data:
